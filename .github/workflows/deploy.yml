name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ] # Se déclenche aussi sur les PR vers master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Requis pour écrire des commentaires sur la PR si besoin (optionnel)
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Configuration de Docker Buildx (meilleur cache et perfs)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        # On ne se log que si ce n'est PAS une PR, ou si on veut vérifier les accès
        # Mais pour push: false, le login n'est pas strictement obligatoire, mais conseillé.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # C'est ici que la magie opère :
          # Si c'est une PR -> push: false (Juste un test de build)
          # Si c'est master -> push: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # Utilise le cache de GitHub Actions pour aller plus vite
          cache-to: type=gha,mode=max

  trigger-deploy:
    # Ce job ne s'exécute que si le build est passé ET que nous sommes sur la branche master
    needs: build-and-push
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VPS Webhook
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"secret": "${{ secrets.WEBHOOK_SECRET }}"}' \
          ${{ secrets.WEBHOOK_URL }}
