name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Main OpenClaw image ---
      - name: Extract metadata (main image)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push main image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max,scope=main

      # --- OpenVPN sidecar image ---
      - name: Extract metadata (openvpn)
        id: meta-openvpn
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/openvpn
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push openvpn image
        uses: docker/build-push-action@v7
        with:
          context: ./docker/openvpn
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-openvpn.outputs.tags }}
          labels: ${{ steps.meta-openvpn.outputs.labels }}
          cache-from: type=gha,scope=openvpn
          cache-to: type=gha,mode=max,scope=openvpn

  trigger-deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VPS Webhook
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"secret": "${{ secrets.WEBHOOK_SECRET }}"}' \
          ${{ secrets.WEBHOOK_URL }}
