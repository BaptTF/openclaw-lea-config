# docker-compose.quiz.yml
# App Road Trip USA 2026 — PWA offline (pas d'auth, PIN dans l'app)

services:
  quiz-pwa:
    image: nginx:alpine
    container_name: quiz-pwa
    restart: always
    volumes:
      - ./quiz-pwa:/usr/share/nginx/html:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.quiz.rule=Host(`${QUIZ_DOMAIN:-quiz.bapttf.com}`)
      - traefik.http.routers.quiz.entrypoints=websecure
      - traefik.http.routers.quiz.tls.certresolver=letsencrypt
      - traefik.http.services.quiz.loadbalancer.server.port=80
    networks:
      - traefik

networks:
  traefik:
    external: true
