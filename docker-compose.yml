services:
  openclaw:
    image: ghcr.io/bapttf/openclaw-lea-config:latest
    container_name: openclaw
    restart: unless-stopped
    ports:
      # - "18789:18789"
      # SSH access (optional, enable with OPENCLAW_SSH_ENABLED=true)
      - "22222:22"
    volumes:
      - ./data:/home/node/.openclaw
      - ./ssh:/home/node/.ssh
      - ./litellm_config.yaml:/home/node/litellm/config.yaml
    env_file:
      - .env
    environment:
      - OPENCLAW_SSH_ENABLED=true
      - OPENCLAW_SSH_PORT=22
      - OPENCLAW_CONFIG_PATH=/home/node/.openclaw/lea/openclaw.json
    depends_on:
      - litellm
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: --config /app/config.yaml --port 4000 --num_workers 1
