# LiteLLM Configuration Example
# Copy to litellm_config.yaml and fill in your AWS credentials
#
# This file is mounted into both the OpenClaw and LiteLLM containers.
# It is .gitignored because it contains secrets.

model_list:
  # ── Chat models (Claude via Bedrock) ──────────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-20250514-v1:0
      aws_region_name: us-west-2
      aws_access_key_id: YOUR_AWS_ACCESS_KEY
      aws_secret_access_key: YOUR_AWS_SECRET_KEY

  - model_name: claude-sonnet-46
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-6
      aws_region_name: us-west-2
      aws_access_key_id: YOUR_AWS_ACCESS_KEY
      aws_secret_access_key: YOUR_AWS_SECRET_KEY

  - model_name: claude-opus
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-5-20251101-v1:0
      aws_region_name: us-west-2
      aws_access_key_id: YOUR_AWS_ACCESS_KEY
      aws_secret_access_key: YOUR_AWS_SECRET_KEY

  - model_name: claude-opus-46
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-6-v1
      aws_region_name: us-west-2
      aws_access_key_id: YOUR_AWS_ACCESS_KEY
      aws_secret_access_key: YOUR_AWS_SECRET_KEY

  - model_name: claude-haiku
    litellm_params:
      model: bedrock/us.anthropic.claude-3-5-haiku-20241022-v1:0
      aws_region_name: us-west-2
      aws_access_key_id: YOUR_AWS_ACCESS_KEY
      aws_secret_access_key: YOUR_AWS_SECRET_KEY

  # ── Embedding model (for OpenClaw memory search) ─────────────
  - model_name: titan-embed-v2
    litellm_params:
      model: bedrock/amazon.titan-embed-text-v2:0
      aws_region_name: us-west-2
      aws_access_key_id: YOUR_AWS_ACCESS_KEY
      aws_secret_access_key: YOUR_AWS_SECRET_KEY

litellm_settings:
  drop_params: true

general_settings:
  master_key: sk-your-litellm-key
