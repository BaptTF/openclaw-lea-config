# docker-compose.potager.yml
# Site potager Camille — auth GitHub via oauth2-proxy + Traefik (external)
# Pattern Baptiste : oauth2-proxy sert les fichiers directement, pas de nginx

services:
  potager:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: potager
    restart: always
    command:
      - --provider=github
      - --client-id=${GITHUB_CLIENT_ID}
      - --client-secret=${GITHUB_CLIENT_SECRET}
      - --cookie-secret=${COOKIE_SECRET}
      - --github-user=rjullien,jlncamille,BaptTF,NicoleJ06
      - --email-domain=*
      - --upstream=file:///site
      - --http-address=0.0.0.0:4180
      - --redirect-url=https://${POTAGER_DOMAIN:-potager.bapttf.com}/oauth2/callback
    volumes:
      - potager-site:/site:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.potager.rule=Host(`${POTAGER_DOMAIN:-potager.bapttf.com}`)
      - traefik.http.routers.potager.entrypoints=websecure
      - traefik.http.routers.potager.tls.certresolver=letsencrypt
      - traefik.http.services.potager.loadbalancer.server.port=4180
    networks:
      - traefik

  potager-updater:
    image: alpine/git:latest
    container_name: potager-updater
    restart: always
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cd /site
        git clone -b site https://github.com/rjullien/camille-potager.git . 2>/dev/null || true
        while true; do
          git pull -q origin site
          sleep 86400
        done
    volumes:
      - potager-site:/site
    networks: []

volumes:
  potager-site:

networks:
  traefik:
    external: true
